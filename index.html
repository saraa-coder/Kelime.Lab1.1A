<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Lab 1.1A</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="start-screen">
        <header>
            <h1>Kelime Lab <span class="version">1.1A</span></h1>
            <p class="subtitle">Laboratorio de Vocabulario</p>
        </header>
        
        <div id="mode-selector">
            <span class="mode-label">SELECCIONA MODO DE ESTUDIO:</span>
            
            <button onclick="setMode('tr-es')" class="primary-btn btn-tr-es">
                Turco ➔ Español
            </button>
            
            <button onclick="setMode('es-tr')" class="primary-btn btn-es-tr">
                Español ➔ Turco
            </button>
            
            <button onclick="setMode('mixed')" class="primary-btn btn-karisik">
                Karışık
            </button>
        </div>

        <div class="divider"></div>

        <div id="action-buttons">
            <button id="start-button" onclick="resetAndStart()" class="primary-btn btn-new">
                NUEVA PARTIDA
            </button>
            
            <button id="resume-button" onclick="startGame()" class="primary-btn btn-resume" style="display: none;">
                CONTINUAR
            </button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">Progreso</span>
                <span id="percent">%0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completadas</span>
                <span id="score">0</span>
            </div>
        </div>

        <div id="dots-container">
            <div id="dots"></div>
        </div>

        <main id="question-area">
            <div id="word">Cargando...</div>
        </main>

        <div id="options" class="options-grid">
            </div>

        <button onclick="location.reload()" class="back-link">Volver al Menú</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
