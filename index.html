<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turco Master - Karışık Edition</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #ffffff;
            --primary-btn: #3949ab;
            --correct: #4caf50;
            --wrong: #f44336;
            --accent: #9c27b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Pantalla de Inicio */
        #start-screen {
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 { margin-bottom: 30px; font-size: 2.5rem; color: #fff; }

        .mode-label {
            display: block;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #bbb;
        }

        /* Contenedor del Juego */
        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .stats-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #word {
            font-size: 2.2rem;
            margin: 40px 0;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .word-mastered { color: #ffd700; transform: scale(1.1); }

        /* Botones */
        .primary-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .primary-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .option {
            background: var(--card-bg);
            border: 2px solid #334;
            padding: 20px 10px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .option.correct { background-color: var(--correct) !important; border-color: white; }
        .option.wrong { background-color: var(--wrong) !important; }

        /* Puntos de Progreso (Dots) */
        #dots {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background: #334;
            border-radius: 50%;
            transition: 0.3s;
        }

        .dot.active { background: #4caf50; box-shadow: 0 0 10px #4caf50; }
        .dot.mastered { background: #ffd700; }

        .has-mastered .option { opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>TURCO MASTER</h1>
        
        <div id="mode-selector">
            <span class="mode-label">SELECCIONA MODO:</span>
            
            <button onclick="setMode('tr-es')" class="primary-btn" style="background-color: #4caf50;">
                Turco ➔ Español
            </button>
            
            <button onclick="setMode('es-tr')" class="primary-btn" style="background-color: #ff9800;">
                Español ➔ Turco
            </button>
            
            <button onclick="setMode('mixed')" class="primary-btn" style="background-color: var(--accent);">
                Karışık (Mezclado)
            </button>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #334;">

        <div id="action-buttons">
            <button id="start-button" onclick="resetAndStart()" class="primary-btn" style="background-color: var(--primary-btn);">
                NUEVA PARTIDA
            </button>
            
            <button id="resume-button" onclick="startGame()" class="primary-btn" style="display: none; background-color: #5c6bc0;">
                CONTINUAR
            </button>
        </div>
    </div>

    <div id="game-container">
        <div class="stats-bar">
            <span id="score">0 tamamlanan</span>
            <span id="percent">%0</span>
        </div>

        <div id="dots"></div>

        <div id="word">Cargando...</div>

        <div id="options">
            </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
